name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build binaries on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Fetch tags
        run: git fetch --prune --unshallow --tags

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller poetry-dynamic-versioning

      - name: Set VERSION variable
        shell: bash
        run: |
          VERSION=$(python tools/version.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build with PyInstaller (Custom Adaptive Logic)
        run: |
          python tools/build_exe.py

      - name: Package Artifacts (Windows)
        if: matrix.platform == 'windows'
        run: |
          powershell Compress-Archive -Path "dist/JavSP.exe", "config.yml" -DestinationPath JavSP-${{ env.VERSION }}-windows-x64.zip

      - name: Package Artifacts (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          cp ../config.yml .
          # 注意：在 Linux/macOS 下文件名可能不带 .exe
          [ -f JavSP.exe ] && EXE_NAME="JavSP.exe" || EXE_NAME="JavSP"
          tar -czvf ../JavSP-${{ env.VERSION }}-${{ matrix.platform }}-${{ matrix.platform == 'macos' && 'arm64' || 'x64' }}.tar.gz $EXE_NAME config.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavSP-${{ env.VERSION }}-${{ matrix.platform }}
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract Changelog
        id: extract_changelog
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          changelog=$(sed -n "/## $TAG_NAME/,/## v/p" CHANGELOG.md | sed '1d;$d')
          if [ -z "$changelog" ]; then
            changelog=$(sed -n '/## \[Unreleased\]/,/## v/p' CHANGELOG.md | sed '1d;$d')
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract_changelog.outputs.BODY }}
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
