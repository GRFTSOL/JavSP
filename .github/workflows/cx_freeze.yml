name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build binaries on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            suffix: tar.gz
          - os: windows-latest
            platform: windows
            suffix: zip
          - os: macos-latest
            platform: macos
            suffix: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Fetch tags
        run: git fetch --prune --unshallow --tags

      - name: Install poetry
        run: pipx install poetry

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'poetry'

      - name: Setup dynamic versioning
        run: poetry self add poetry-dynamic-versioning

      - name: Install dependencies
        run: poetry install

      - name: Build with Cx_Freeze
        run: poetry run python setup.py build_exe -b dist

      - name: Set VERSION variable
        shell: bash
        run: echo "VERSION=$(poetry run python tools/version.py)" >> $GITHUB_ENV

      - name: Package Artifacts (Windows)
        if: matrix.platform == 'windows'
        run: |
          powershell Compress-Archive -Path dist\* -DestinationPath JavSP-${{ env.VERSION }}-windows-x64.zip

      - name: Package Artifacts (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czvf ../JavSP-${{ env.VERSION }}-${{ matrix.platform }}-${{ matrix.platform == 'macos' && 'arm64' || 'x64' }}.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavSP-${{ env.VERSION }}-${{ matrix.platform }}
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract Changelog
        id: extract_changelog
        shell: bash
        run: |
          # 提取 [Unreleased] 下方的更新内容
          changelog=$(sed -n '/## \[Unreleased\]/,/## v/p' CHANGELOG.md | sed '1d;$d')
          if [ -z "$changelog" ]; then
            # 备选：提取最近一个版本号的内容
            changelog=$(sed -n '/## v/,/## v/p' CHANGELOG.md | sed '$d')
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract_changelog.outputs.BODY }}
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
